name: CI

on:
  push:
  pull_request:

jobs:
  build:
    name: Test and build
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cargo test
        run: cargo test

      - name: npm build
        run: npm run build

      - name: npm package dry run
        run: npm pack --dry-run
